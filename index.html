<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toshi Medatwal — Work</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf9f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { max-width: 560px; }
    h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
    p { color: #555; font-size: 16px; margin-bottom: 32px; line-height: 1.5; }
    .card {
      display: block;
      padding: 20px 24px;
      background: #fff;
      border: 1px solid #e5e3dc;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: #1a1a1a; transform: translateY(-1px); }
    .card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 6px; }
    .card .title { font-size: 18px; font-weight: 600; }
    .card .desc { font-size: 14px; color: #666; margin-top: 4px; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Toshi Medatwal</h1>
    <p>Selected work.</p>
    <div class="stack">
      <a class="card" href="./fringle-case-study/">
        <div class="label">Case study · 2025</div>
        <div class="title">Fringle — Friendship starts here.</div>
        <div class="desc">A product case study.</div>
      </a>
      <a class="card" href="./fitness-mates-case-study/">
        <div class="label">Case study · 2025</div>
        <div class="title">Fitness Mates</div>
        <div class="desc">A product case study.</div>
      </a>
    </div>
  </div>
</body>
</html>
